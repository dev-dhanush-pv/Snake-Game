<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake-Game</title>
    <style>
        #playArea{
            height: 500px;
            width: 1000px;
            position: relative;
            background-color: green;
            border: 10px solid black;
        }
        #head,.body{
            height: 20px;
            width: 20px;
            position: absolute;
            display: inline;
            background-color : red;
            border-radius: 25%;
        }
        #food{
            height: 20px;
            width: 20px;
            background-color: white;
            position: absolute;
        }

    </style>
</head>
<body>
    <div id="playArea">
        <div id="head" style="left: 0px; top: 0px;"></div>
        <div class="body" style="left: 0px; top: 0px;"></div>
        <div class="body" style="left: 0px; top: 0px;"></div>
        <div id="food" style="left: 140px; top: 100px;"></div>
    </div>

    <script src="./snake.js"></script>
        
</body>
</html>
